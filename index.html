<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Tech Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            height: 60vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero-section h1 {
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .is-valid {
            border-color: #198754 !important;
            background-color: #d1e7dd !important;
        }
        .is-invalid {
            border-color: #dc3545 !important;
            background-color: #f8d7da !important;
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="container">
            <h1>Technology for a Greener Future</h1>
        </div>
    </header>

    <section class="container py-5">
        <h2 class="text-center mb-4">Các Giải Pháp Công Nghệ Xanh</h2>
        <div class="row text-center">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h4>Solar Energy</h4>
                    <p>Giải pháp năng lượng mặt trời tối ưu.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h4>Waste Management</h4>
                    <p>Hệ thống xử lý và quản lý rác thải thông minh.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h4>Smart Irrigation</h4>
                    <p>Công nghệ tưới tiêu tự động tiết kiệm nước.</p>
                </div>
            </div>
        </div>
    </section>

    <section class="bg-light py-5">
        <div class="container">
            <h2 class="text-center mb-4">Trở Thành Đối Tác</h2>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <form id="contactForm">
                        <div class="mb-3">
                            <label for="fullname" class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" id="fullname" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Lời nhắn</label>
                            <textarea class="form-control" id="message" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Gửi Thông Tin</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const emailInput = document.getElementById('email');
            const emailValue = emailInput.value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; 

            if (emailRegex.test(emailValue)) {
                emailInput.classList.remove('is-invalid');
                emailInput.classList.add('is-valid');
                alert("Cảm ơn bạn! Thông tin đã được gửi hợp lệ.");
            } else {
                emailInput.classList.remove('is-valid');
                emailInput.classList.add('is-invalid');
                alert("Vui lòng nhập đúng định dạng Email (ví dụ: ten@gmail.com)!");
            }
        });
    </script>
</body>
</html>
